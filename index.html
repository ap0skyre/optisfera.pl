/* === mobile fixes: podstrony === */
@media (max-width:639px){
  /* statystyki w hero: 3. kafelek na pełną szerokość zamiast sieroty w połowie rzędu */
  div.grid-cols-2.max-w-3xl>div:nth-child(3){grid-column:span 2}
  /* mniejsze odstępy sekcji i kart na telefonie (Towary/Promocje/Kontakt/O nas) */
  .py-24{padding-top:4.5rem;padding-bottom:4.5rem}
  .pb-28{padding-bottom:5rem}
  .p-8{padding:1.5rem}
  .p-7{padding:1.3rem}
  .lg\:p-16{padding:1.6rem}
  /* numery telefonów w karcie kontaktu odrobinę mniejsze na wąskich ekranach */
  a[href^="tel"] span.font-display{font-size:1.6rem}
}
/* === mobile fixes (override) === */
@media (max-width:639px){
  header>div.flex{flex-wrap:wrap;justify-content:center;row-gap:.35rem;padding:.6rem 1rem .65rem}
  svg[aria-label=OptiSfera]{height:2.35rem}
  header nav.flex{width:100%;justify-content:center;gap:1.25rem}
  header nav.flex button{font-size:.78rem}
}
@media (max-width:767px){
  a.font-display[href^="mailto"]{word-break:break-all;font-size:1.3rem;line-height:1.45}
}
@media (max-width:430px){
  footer div.flex.gap-16{gap:2.2rem;flex-wrap:wrap}
}
